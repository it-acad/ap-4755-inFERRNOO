<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Список книг</title>
</head>
<body class="bg-light p-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-primary">Бібліотека</h1>
            <a href="{% url 'create-book' %}" class="btn btn-success">+ Додати книгу</a>
        </div>

        <form method="GET" action="{% url 'book-list' %}" class="row mb-4">
            <div class="col-md-5">
                <input type="text" name="name" class="form-control" placeholder="Пошук за назвою..." value="{{ request.GET.name }}">
            </div>
            <div class="col-md-5">
                <input type="text" name="author" class="form-control" placeholder="Пошук за автором..." value="{{ request.GET.author }}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Фільтрувати</button>
            </div>
        </form>

        <div class="row">
            {% for book in books %}
            <div class="col-md-4">
                <div class="card shadow-sm mb-4" style="border-radius: 12px; border: none;">
                    <div class="card-body">
                        <h5 class="card-title text-dark">{{ book.name }}</h5>
                        <p class="text-muted small">Кількість: {{ book.count }}</p>
                        <a href="{% url 'book-detail' book.pk %}" class="btn btn-outline-primary btn-sm">Детальніше</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <p class="text-center text-muted">Книг за вашим запитом не знайдено.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
