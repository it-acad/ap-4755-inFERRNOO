<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Книги користувача</title>
</head>
<body class="bg-light p-5">
    <div class="container">
        <h2 class="mb-4">Книги, видані користувачу: {{ target_user.username }}</h2>
        
        <table class="table table-hover bg-white shadow-sm">
            <thead class="table-primary">
                <tr>
                    <th>Назва книги</th>
                    <th>Опис</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td>{{ book.name }}</td>
                    <td>{{ book.description }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">Цей користувач не має виданих книг.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{% url 'book-list' %}" class="btn btn-secondary">Повернутися до списку книг</a>
    </div>
</body>
</html>
