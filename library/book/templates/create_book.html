<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Створити книгу</title>
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 500px;">
        <div class="card shadow p-4" style="border-radius: 20px;">
            <h2 class="text-center mb-4">Створити книгу</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="name" class="form-control" placeholder="Назва книги" required>
                </div>
                <div class="mb-3">
                    <textarea name="description" class="form-control" placeholder="Опис" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <input type="number" name="count" class="form-control" value="10" placeholder="Кількість">
                </div>
                <div class="mb-3">
                    <label class="form-label">Оберіть автора(ів):</label>
                    <select name="authors" class="form-control" multiple required>
                        {% for author in authors %}
                            <option value="{{ author.id }}">{{ author.name }}</option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">Утримуйте Ctrl для вибору кількох авторів.</small>
                </div>
                <button type="submit" class="btn btn-primary w-100">Зберегти</button>
            </form>
        </div>
    </div>
</body>
</html>
